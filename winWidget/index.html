<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="theme-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-timezone@0.5.45/builds/moment-timezone-with-data.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: no-drag;
            transition: background-color 0.3s, color 0.3s;
        }
        
        
        .widget-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* --- contentView: külön "ablak"/panel a barView mellett; kinyitáskor jelenik meg --- */
        .contentView {
            display: none;
            flex-direction: column;
            height: 520px;
            overflow: hidden;
        }
        
        .widget-container.expanded .contentView {
            display: flex;
        }
        
        /* --- contentView: fő tartalom (lista + összecsuk) --- */
        .contentView-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .contentView-main.hide {
            display: none;
        }
        
        .contentView-main .refresh-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-secondary);
        }
        
        .refresh-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-toggle-past {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-secondary);
            background-color: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .btn-toggle-past:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .btn-toggle-past.active {
            background-color: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--text-primary);
        }
        
        .meeting-past {
            opacity: 0.6;
        }

        .meeting-ongoing {
            border-color: #198754;
        }

        .meeting-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: rgba(25, 135, 84, 0.15);
            color: #198754;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .btn-quit-header {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #dc3545;
            background-color: transparent;
            color: #dc3545;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .btn-quit-header:hover {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-quit-header:active {
            transform: scale(0.95);
        }
        
        .btn-settings-header {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-secondary);
            background-color: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .btn-settings-header:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .btn-settings-header:active {
            transform: scale(0.95);
        }
        
        .btn-settings-icon {
            width: 14px;
            height: 14px;
            display: inline-block;
        }
        
        .btn-refresh {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-secondary);
            background-color: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .btn-refresh:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .btn-refresh:active {
            transform: scale(0.95);
        }
        
        .btn-refresh.refreshing {
            opacity: 0.6;
            cursor: wait;
        }
        
        .btn-refresh-icon {
            width: 14px;
            height: 14px;
            display: inline-block;
        }
        
        .contentView-main .list-wrap {
            flex: 1;
            overflow-y: auto;
        }
        
        .calendar-day-section {
            margin-bottom: 16px;
        }
        
        .calendar-day-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-secondary);
            font-size: 12px;
            font-weight: 600;
        }
        
        .list-group {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        
        .list-group-item {
            border: 1px solid var(--border-secondary);
            border-top: none;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: background-color 0.2s;
            -webkit-app-region: no-drag;
        }
        
        .list-group-item:first-child {
            border-top: 1px solid var(--border-secondary);
        }
        
        .meeting-subject {
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }
        
        .meeting-details-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }
        
        .meeting-time-until {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        
        .time-until-green {
            color: #28a745;
        }
        
        .time-until-yellow {
            color: #ffc107;
        }
        
        .time-until-red {
            color: #dc3545;
        }
        
        .barView-time-until.time-until-green {
            color: #28a745;
        }
        
        .barView-time-until.time-until-yellow {
            color: #ffc107;
        }
        
        .barView-time-until.time-until-red {
            color: #dc3545;
        }
        
        .meeting-separator {
            margin: 0 4px;
        }
        
        .meeting-details {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        
        .meeting-time {
            white-space: nowrap;
        }
        
        .meeting-duration {
            white-space: nowrap;
        }
        
        .meeting-participants {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }
        
        .meeting-user-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            overflow: hidden;
            cursor: help;
        }
        
        .meeting-user-avatar.monogram {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
        }
        
        .meeting-more-count {
            font-size: 11px;
            margin-left: 4px;
            cursor: help;
        }
        
        .btn-teams-join {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid #6264a7;
            background-color: #6264a7;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-app-region: no-drag;
            white-space: nowrap;
        }
        
        .btn-teams-join:hover {
            background-color: #4f52a0;
        }
        
        .btn-action {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #0d6efd;
            background-color: #0d6efd;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-app-region: no-drag;
        }
        
        .btn-action:hover {
            background-color: #0b5ed7;
        }
        
        .contentView-main .btn-close-wrap {
            padding: 8px 12px;
            text-align: center;
        }
        
        .btn-close {
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid #6c757d;
            background-color: #6c757d;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-app-region: no-drag;
        }
        
        .btn-close:hover {
            background-color: #5c636a;
        }
        
        /* --- contentView: settings (teljes tartalom = belépés card + quit gomb) --- */
        .contentView-settings {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 12px;
            min-height: 0;
        }
        
        .contentView-settings.show {
            display: flex;
        }
        
        .contentView-settings .card {
            border: 1px solid var(--border-secondary);
            border-radius: 8px;
            flex-shrink: 0;
        }
        
        .contentView-settings .card-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-secondary);
            font-size: 14px;
            font-weight: 600;
        }
        
        .contentView-settings .card-body {
            padding: 14px;
        }
        
        /* Bejelentkezés: nincs user */
        .settings-login-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .btn-login-microsoft {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #5b5fc7;
            background-color: #5b5fc7;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            -webkit-app-region: no-drag;
        }
        
        .btn-login-microsoft:hover {
            background-color: #4a4eb5;
            border-color: #4a4eb5;
        }
        
        .btn-login-microsoft .ms-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        
        /* Bejelentkezés: van user */
        .settings-user-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .settings-user-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .settings-user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            overflow: hidden;
        }
        
        .settings-user-avatar.monogram {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
        }
        
        .settings-user-text {
            flex: 1;
            min-width: 0;
        }
        
        .settings-user-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .settings-user-email {
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .btn-logout {
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #dc3545;
            background-color: #dc3545;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-app-region: no-drag;
        }
        
        .btn-logout:hover {
            background-color: #c82333;
        }
        
        .settings-loading {
            font-size: 12px;
        }
        
        .settings-theme-wrap {
            margin-top: 16px;
            padding-top: 16px;
        }
        
        .settings-theme-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .settings-theme-label {
            font-size: 13px;
            font-weight: 500;
        }
        
        .settings-theme-options {
            display: flex;
            gap: 16px;
            margin-left: 0;
        }
        
        .theme-option {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }
        
        .theme-option input[type="radio"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .settings-color-wrap {
            margin-top: 16px;
            padding-top: 16px;
        }
        
        .settings-color-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .settings-color-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }
        
        .settings-color-label input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .settings-color-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 24px;
            margin-top: 8px;
        }

        .settings-meeting-wrap {
            margin-top: 16px;
            padding-top: 16px;
        }

        .settings-meeting-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-meeting-label {
            font-size: 13px;
            font-weight: 500;
        }

        .settings-meeting-input {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .settings-meeting-number {
            width: 60px;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid var(--border-secondary);
            border-radius: 4px;
            -webkit-app-region: no-drag;
        }

        .settings-meeting-number:focus {
            outline: none;
            border-color: #6264a7;
        }

        .settings-meeting-number::-webkit-inner-spin-button,
        .settings-meeting-number::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .color-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .color-input-label {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        
        .color-input-label span:first-child {
            min-width: 50px;
            font-weight: 500;
        }
        
        .color-input {
            width: 60px;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid var(--border-secondary);
            border-radius: 4px;
            -webkit-app-region: no-drag;
        }
        
        .color-input:focus {
            outline: none;
            border-color: #6264a7;
        }
        
        .color-input::-webkit-inner-spin-button,
        .color-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .color-dot.color-green {
            background-color: #28a745;
        }
        
        .color-dot.color-yellow {
            background-color: #ffc107;
        }
        
        .color-dot.color-red {
            background-color: #dc3545;
        }
        
        /* Program bezárása gomb - bal alsó, piros outline stílus */
        .settings-quit-wrap {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 0 0 0;
            min-height: 48px;
        }
        
        .btn-close-settings {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #ffc107;
            background-color: transparent;
            color: #ffc107;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, color 0.2s;
            -webkit-app-region: no-drag;
            font-weight: 400;
        }
        
        .btn-close-settings:hover {
            background-color: #ffc107;
            color: #212529;
        }
        
        .btn-quit-app {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #dc3545;
            background-color: transparent;
            color: #dc3545;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, color 0.2s;
            -webkit-app-region: no-drag;
            font-weight: 400;
        }
        
        .btn-quit-app:hover {
            background-color: #dc3545;
            color: white;
        }
        
        /* --- barView: mindig ugyanúgy néz ki, változatlan; a contentView-től független --- */
        .barView {
            height: 56px;
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            -webkit-app-region: drag;
        }
        
        .barView-time-until {
            padding: 0 8px;
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
            display: none;
            align-items: center;
            justify-content: center;
            -webkit-app-region: no-drag;
        }
        
        .barView-time-until.show {
            display: flex;
        }
        
        .barView-separator {
            width: 1px;
            height: 24px;
            display: none;
        }
        
        .barView-separator.show {
            display: block;
        }
        
        .barView-data {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 12px;
            min-width: 0;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        .barView-data.barView-alert-yellow {
            border-radius: 6px;
            box-shadow: inset 0 0 0 1px #ffc107;
        }

        .barView-data.barView-alert-red {
            border-radius: 6px;
            box-shadow: inset 0 0 0 2px #dc3545;
        }
        
        .barView-title {
            font-size: 13px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 2px;
        }
        
        .barView-details {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            min-width: 0;
            overflow: hidden;
        }
        
        .barView-time {
            white-space: nowrap;
        }
        
        .barView-duration {
            white-space: nowrap;
        }
        
        .barView-participants {
            display: flex;
            align-items: center;
            gap: 3px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        
        .barView-user-avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            overflow: hidden;
            cursor: help;
        }
        
        .barView-user-avatar.monogram {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 600;
        }
        
        .barView-more-count {
            font-size: 10px;
            margin-left: 2px;
            cursor: help;
        }
        
        .barView-teams {
            padding: 0 8px;
            display: none;
            align-items: center;
            justify-content: center;
            -webkit-app-region: no-drag;
        }
        
        .barView-teams.show {
            display: flex;
        }
        
        .btn-teams-bar {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid #6264a7;
            background-color: #6264a7;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-app-region: no-drag;
            white-space: nowrap;
        }
        
        .btn-teams-bar:hover {
            background-color: #4f52a0;
        }
        
        .barView-web-actions {
            border-left: 1px solid var(--border-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 6px;
            -webkit-app-region: no-drag;
        }

        .barView-actions-expanded {
            display: none;
            align-items: center;
            gap: 4px;
        }

        .barView-expanded .barView-actions-expanded {
            display: flex;
        }

        .btn-outlook-web {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-secondary);
            background-color: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
            -webkit-app-region: no-drag;
            font-size: 14px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-outlook-web:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        .btn-outlook-web svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .btn-time-web svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .btn-jira-web svg {
            width: 18px;
            height: 18px;
            display: block;
        }

    </style>
</head>
<body>
    <div class="widget-container" id="widgetContainer">
        <!-- contentView: kinyitott állapotban a fő tartalom VAGY a settings -->
        <div class="contentView" id="contentView">
            <!-- Fő tartalom: lista + összecsuk gomb -->
            <div class="contentView-main" id="contentViewMain">
                <div class="refresh-header">
                    <div class="refresh-header-left">
                        <button class="btn-quit-header" id="btnQuitHeader" title="Program bezárása">
                            <span>Kilépés</span>
                        </button>
                        <button class="btn-settings-header" id="btnSettingsHeader" title="Beállítások">
                            <svg class="btn-settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"></path>
                            </svg>
                            <span>Beállítások</span>
                        </button>
                    </div>
                    <div class="refresh-header-right">
                        <button class="btn-toggle-past" id="btnTogglePast" title="Elmúlt meetingek megjelenítése/elrejtése">
                            <span>Elmúltak</span>
                        </button>
                        <button class="btn-refresh" id="btnRefresh" title="Naptár frissítése">
                            <svg class="btn-refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                            <span>Frissítés</span>
                        </button>
                    </div>
                </div>
                <div class="list-wrap">
                    <ul class="list-group" id="itemList"></ul>
                </div>
                <div class="btn-close-wrap">
                    <button class="btn-close" id="btnCollapse">Összecsuk</button>
                </div>
            </div>
            
            <!-- Settings: belépés card + program bezárása -->
            <div class="contentView-settings" id="contentViewSettings">
                <div class="card">
                    <div class="card-header">Belépés</div>
                    <div class="card-body">
                        <div class="settings-login-wrap" id="settingsLoginWrap">
                            <button class="btn-login-microsoft" id="btnLoginMicrosoft">
                                <svg class="ms-icon" viewBox="0 0 23 23" fill="none"><rect width="11" height="11" fill="#f25022"/><rect x="12" width="11" height="11" fill="#7fba00"/><rect y="12" width="11" height="11" fill="#00a4ef"/><rect x="12" y="12" width="11" height="11" fill="#ffb900"/></svg>
                                Bejelentkezés Microsofttal
                            </button>
                        </div>
                        <div class="settings-user-wrap" id="settingsUserWrap" style="display: none;">
                            <div class="settings-user-row">
                                <img class="settings-user-avatar" id="settingsUserPhoto" alt="" style="display: none;">
                                <div class="settings-user-avatar monogram" id="settingsUserMonogram" style="display: none;">?</div>
                                <div class="settings-user-text">
                                    <div class="settings-user-name" id="settingsUserName">–</div>
                                    <div class="settings-user-email" id="settingsUserEmail">–</div>
                                </div>
                            </div>
                            <button class="btn-logout" id="btnLogout">Kijelentkezés</button>
                        </div>
                        <div class="settings-theme-wrap" id="settingsThemeWrap" style="display: none;">
                            <div class="settings-theme-row">
                                <label class="settings-theme-label">Téma:</label>
                                <div class="settings-theme-options">
                                    <label class="theme-option">
                                        <input type="radio" name="theme" value="dark" id="themeDark" checked>
                                        <span>Sötét</span>
                                    </label>
                                    <label class="theme-option">
                                        <input type="radio" name="theme" value="light" id="themeLight">
                                        <span>Világos</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="settings-color-wrap" id="settingsColorWrap" style="display: none;">
                            <div class="settings-color-row">
                                <label class="settings-color-label">
                                    <input type="checkbox" id="settingsColorEnabled" checked>
                                    <span>Hátralévő percek színezése</span>
                                </label>
                                <div class="settings-color-inputs">
                                    <div class="color-input-group">
                                        <span class="color-dot color-green"></span>
                                        <label class="color-input-label">
                                            <span>Zöld:</span>
                                            <input type="number" id="colorGreenFrom" class="color-input" placeholder="től" min="-60" step="1">
                                            <span>-</span>
                                            <input type="number" id="colorGreenTo" class="color-input" placeholder="ig" min="-60" step="1">
                                            <span>perc</span>
                                        </label>
                                    </div>
                                    <div class="color-input-group">
                                        <span class="color-dot color-yellow"></span>
                                        <label class="color-input-label">
                                            <span>Sárga:</span>
                                            <input type="number" id="colorYellowFrom" class="color-input" placeholder="től" min="-60" step="1">
                                            <span>-</span>
                                            <input type="number" id="colorYellowTo" class="color-input" placeholder="ig" min="-60" step="1">
                                            <span>perc</span>
                                        </label>
                                    </div>
                                    <div class="color-input-group">
                                        <span class="color-dot color-red"></span>
                                        <label class="color-input-label">
                                            <span>Piros:</span>
                                            <input type="number" id="colorRedFrom" class="color-input" placeholder="től" min="-60" step="1">
                                            <span>-</span>
                                            <input type="number" id="colorRedTo" class="color-input" placeholder="ig" min="-60" step="1">
                                            <span>perc</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="settings-meeting-wrap" id="settingsMeetingWrap" style="display: none;">
                            <div class="settings-meeting-row">
                                <label class="settings-meeting-label">Megjelenítés kezdés után:</label>
                                <div class="settings-meeting-input">
                                    <input type="number" id="meetingGraceMinutes" class="settings-meeting-number" min="0" step="1">
                                    <span>perc</span>
                                </div>
                            </div>
                        </div>
                        <div class="settings-loading" id="settingsAuthLoading" style="display: none;">Betöltés…</div>
                    </div>
                </div>
                <div class="settings-quit-wrap">
                    <button class="btn-close-settings" id="btnCloseSettings" title="Beállítások bezárása">Bezárás</button>
                </div>
            </div>
        </div>
        
        <!-- barView: összecsukott sáv - mindig látható -->
        <div class="barView" id="barView">
            <div class="barView-time-until" id="barViewTimeUntil"></div>
            <div class="barView-separator" id="barViewSeparator"></div>
            <div class="barView-data" id="barViewData">
                <div class="barView-title" id="barViewTitle">Következő</div>
                <div class="barView-details" id="barViewDetails">
                    <span class="barView-time" id="barViewTime"></span>
                    <span class="barView-duration" id="barViewDuration"></span>
                    <div class="barView-participants" id="barViewParticipants"></div>
                </div>
            </div>
            <div class="barView-separator" id="barViewSeparator2"></div>
            <div class="barView-teams" id="barViewTeams">
                <button class="btn-teams-bar" id="btnTeamsBar" title="Csatlakozás Teams meetinghez">Teams</button>
            </div>
            <div class="barView-web-actions">
                <div class="btn-group" role="group" aria-label="Webview gombok" style="-webkit-app-region: no-drag;">
                    <button class="btn-outlook-web" id="btnOutlookWeb" title="Outlook naptár megnyitása" aria-label="Outlook naptár megnyitása">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="2" y="5" width="9" height="14" rx="1.5" fill="#0a66c2"></rect>
                            <rect x="9" y="4" width="13" height="16" rx="2" fill="#1a82e2"></rect>
                            <path d="M6.5 10.5h1.2l.9 1.5.9-1.5h1.2l-1.5 2.5 1.5 2.5H9.5l-.9-1.5-.9 1.5H6.5l1.5-2.5-1.5-2.5z" fill="#ffffff"></path>
                        </svg>
                    </button>
                </div>
                <div class="barView-actions-expanded">
                    <button class="btn-outlook-web btn-time-web" id="btnTimeWeb" title="Trükk megnyitása" aria-label="Trükk megnyitása">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="9" fill="#10b981"></circle>
                            <path d="M12 7v5l3 2" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
                        </svg>
                    </button>
                    <button class="btn-outlook-web btn-jira-web" id="btnJiraClockwork" title="Jira clockwork megnyitása" aria-label="Jira clockwork megnyitása">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h7l2 3h7v9H11l-2-3H4z" fill="#0052cc"></path>
                            <path d="M4 6h7l2 3h7" stroke="#ffffff" stroke-width="1.4" fill="none"></path>
                        </svg>
                    </button>
                </div>
                <button class="btn-outlook-web" id="btnBarExpand" title="További ikonok" aria-label="További ikonok">&gt;&gt;</button>
            </div>
        </div>
    </div>
    
    <script src="date-utils-browser.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
