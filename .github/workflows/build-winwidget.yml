name: Build WinWidget

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-winwidget:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: winWidget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: winWidget/node_modules
          key: winwidget-${{ runner.os }}-node-${{ hashFiles('winWidget/package-lock.json') }}
          restore-keys: |
            winwidget-${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskbarCalendar-exe
          path: winWidget/dist/*.exe
