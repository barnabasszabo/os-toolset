name: Build WinWidget

on:
  push:
    branches:
      - master

jobs:
  build-winwidget:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: winWidget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: winwidget-exe
          path: winWidget/dist/*.exe
